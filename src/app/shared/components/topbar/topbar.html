<header class="topbar">

  <!-- Boton hamburguesa / colapsar -->
  <button
    class="topbar-menu-btn"
    (click)="layoutService.toggleSidebar()"
    type="button"
    title="Alternar panel lateral"
    id="topbar-menu-toggle"
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>



  <!-- Acciones de la derecha -->
  <div class="topbar-actions">

    <!-- Toggle tema claro / oscuro -->
    <button
      class="topbar-theme-btn"
      (click)="themeService.toggle()"
      type="button"
      [title]="themeService.theme() === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
      id="topbar-theme-toggle"
    >
      @if (themeService.theme() === 'dark') {
        <!-- Sol: tema claro -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
      } @else {
        <!-- Luna: tema oscuro -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      }
    </button>

    <button
      class="topbar-logout-btn"
      (click)="logout()"
      type="button"
      title="Cerrar sesion"
      id="topbar-logout"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
      </svg>
      <span class="logout-label">Cerrar sesion</span>
    </button>
  </div>

</header>
